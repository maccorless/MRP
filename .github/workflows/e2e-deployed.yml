name: E2E — Railway Deployed

on:
  push:
    branches: [main]

jobs:
  e2e-deployed:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Wait for Railway deployment
        env:
          RAILWAY_URL: ${{ vars.RAILWAY_PRODUCTION_URL }}
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          if [ -z "$RAILWAY_URL" ]; then
            echo "Error: RAILWAY_PRODUCTION_URL is not set in repository variables (Settings → Secrets and variables → Actions → Variables)"
            exit 1
          fi
          echo "Waiting for Railway to deploy commit ${EXPECTED_SHA}..."
          for i in $(seq 1 40); do
            DEPLOYED_SHA=$(curl -sf "${RAILWAY_URL}/api/health" | jq -r '.sha // empty' 2>/dev/null || true)
            if [ "$DEPLOYED_SHA" = "$EXPECTED_SHA" ]; then
              echo "Railway is up with correct commit (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: deployed=${DEPLOYED_SHA:-none} expected=${EXPECTED_SHA} — waiting 30s..."
            sleep 30
          done
          echo "Railway did not deploy the expected commit in time"
          exit 1

      - name: Run Playwright tests against Railway
        run: bun test:e2e
        env:
          E2E_BASE_URL: ${{ vars.RAILWAY_PRODUCTION_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-deployed
          path: playwright-report/
          retention-days: 14
