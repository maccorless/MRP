name: E2E — Railway Deployed

on:
  push:
    branches: [main]

jobs:
  e2e-deployed:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Wait for Railway deployment
        env:
          RAILWAY_URL: ${{ vars.RAILWAY_PRODUCTION_URL }}
        run: |
          if [ -z "$RAILWAY_URL" ]; then
            echo "Error: RAILWAY_PRODUCTION_URL is not set in repository variables (Settings → Secrets and variables → Actions → Variables)"
            exit 1
          fi
          echo "Waiting 3 minutes for Railway build to complete..."
          sleep 180
          echo "Waiting for Railway to become healthy..."
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${RAILWAY_URL}/")
            if [ "$STATUS" = "200" ]; then
              echo "Railway is up (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — waiting 30s..."
            sleep 30
          done
          echo "Railway did not become healthy in time"
          exit 1

      - name: Run Playwright tests against Railway
        run: bun test:e2e
        env:
          E2E_BASE_URL: ${{ vars.RAILWAY_PRODUCTION_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-deployed
          path: playwright-report/
          retention-days: 14
