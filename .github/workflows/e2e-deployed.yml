name: E2E — Railway Deployed

on:
  push:
    branches: [main]

jobs:
  e2e-deployed:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Wait for Railway deployment
        run: |
          echo "Waiting for Railway to become healthy..."
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://mrp-production-1a18.up.railway.app/)
            if [ "$STATUS" = "200" ]; then
              echo "Railway is up (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — waiting 30s..."
            sleep 30
          done
          echo "Railway did not become healthy in time"
          exit 1

      - name: Run Playwright tests against Railway
        run: bun test:e2e
        env:
          E2E_BASE_URL: https://mrp-production-1a18.up.railway.app
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-deployed
          path: playwright-report/
          retention-days: 14
